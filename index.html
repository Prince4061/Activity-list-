<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrated Skill Based Activity Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for Hindi + English -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=5">

    <!-- Print Styles for PDF -->
    <style>
        @media print {
            body > * { display: none !important; }
            #print-area { display: block !important; }
        }
        #print-area { display: none; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center flex flex-col items-center">
            <img id="schoolLogo" src="https://i.ibb.co/dsMrDjCs/Screenshot-2026-04-22-101540.png" alt="App Logo" crossorigin="anonymous" class="w-32 h-auto mb-4 rounded-xl shadow-sm">
            <h1 class="text-3xl font-bold text-slate-800 mb-1">Integrated Skill Based Activity</h1>
            <div class="bg-blue-50 text-blue-700 px-4 py-1 rounded-full text-sm font-semibold mb-3 border border-blue-100">
                Affiliation No: 3330552
            </div>
            <p class="text-slate-600">Enter activity and topic details to generate your report.</p>
        </header>

        <!-- Teacher General Info -->
        <div class="glass-card p-6 rounded-2xl shadow-md mb-8 max-w-lg mx-auto">
             <label class="block text-sm font-semibold text-slate-700 mb-2">Teacher Name</label>
             <input type="text" id="teacherName" placeholder="Enter Teacher Name" 
                class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all font-medium">
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Form Section -->
            <div class="lg:col-span-4">
                <div class="glass-card p-6 rounded-2xl shadow-xl sticky top-8">
                    <h2 class="text-xl font-semibold mb-4 text-slate-700 border-b pb-2">Add New Entry</h2>
                    <form id="gradeForm" class="space-y-4">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-600 mb-1">Sr. No</label>
                                <input type="text" id="srNo" readonly 
                                    class="w-full px-4 py-2 rounded-lg border border-slate-200 bg-slate-100 text-slate-500 cursor-not-allowed outline-none font-bold">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-600 mb-1">Grade</label>
                                <input type="text" id="grade" required placeholder="10th-A" 
                                    class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">Subject</label>
                            <input type="text" id="subject" required placeholder="e.g. Mathematics" 
                                class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">Topic</label>
                            <input type="text" id="topic" required placeholder="e.g. Algebra" 
                                class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">Activity</label>
                            <textarea id="activity" required placeholder="Describe the activity..." rows="3"
                                class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all resize-none"></textarea>
                        </div>
                        <button type="submit" 
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2 shadow-lg">
                            <span>Add to List</span>
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Table Section -->
            <div class="lg:col-span-8">
                <div class="glass-card p-6 rounded-2xl shadow-xl min-h-[500px] flex flex-col">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-semibold text-slate-700">Preview Table</h2>
                        <button id="downloadPdf" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-md" disabled>
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            Download PDF
                        </button>
                    </div>

                    <div class="overflow-x-auto flex-grow">
                        <table class="w-full text-left border-collapse" id="reportTable">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-100">
                                    <th class="px-3 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider whitespace-nowrap">Sr.</th>
                                    <th class="px-3 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider whitespace-nowrap">Subject</th>
                                    <th class="px-3 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider whitespace-nowrap">Grade</th>
                                    <th class="px-3 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider whitespace-nowrap">Topic</th>
                                    <th class="px-3 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider whitespace-nowrap">Activity</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                <tr id="emptyState">
                                    <td colspan="5" class="px-4 py-20 text-center text-slate-400 italic">
                                        No entries found. Please add data using the form.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-all duration-300 pointer-events-none z-50 transform translate-y-4">
        Entry added successfully!
    </div>

    <!-- Hidden Print Area (used for browser print-to-PDF) -->
    <div id="print-area"></div>

    <!-- Link to external Javascript -->
    <script src="script.js?v=5"></script>
</body>
</html>
